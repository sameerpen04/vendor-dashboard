name: Daily Vendor List Update

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch: 

# This explicitly tells GitHub this runner has permission to write files back to your repo
permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Tools (Pandas & Excel Reader)
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl pytz

    - name: Run Python Automation Script
      run: python update_vendors.py

    - name: Save Changes and Update Dashboard
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html daily_log.txt
        # Using [skip ci] prevents the script from accidentally triggering itself in a loop
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Morning Sync [skip ci]" && git push)
