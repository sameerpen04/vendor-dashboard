name: Daily Vendor List Update

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # This prevents the ModuleNotFoundError by injecting packages into the runner container upfront
    - name: Install Tools & Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl pytz requests

    - name: Run Python Automation Script
      run: python update_vendors.py

    - name: Save Changes and Update Dashboard
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html daily_log.txt
        git commit -m "Automated Sync Execution - $(date +'%Y-%m-%d %H:%M:%S') [skip ci]" || exit 0
        git push origin HEAD:main
